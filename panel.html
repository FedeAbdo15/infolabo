<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel - Laboratorio de Informatica</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #d1dfec;
      color: #1e293b;
    }

    .top-bar {
      background: #365885;
      color: white;
      padding: 1em 1.5em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .top-bar-left {
      display: flex;
      align-items: center;
    }
    /* Le damos margen derecho únicamente al logo para empujar el texto */
    .top-bar-left .logo {
      margin-right: 1em;

    }

    .logo {
      background: #187b8b;
      color: #1a56db;
      height: 3.25em;
      width: 3.25em;
      border-radius: 0.625em;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.25em;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo img {
      width: 100%;       /* Obliga a la imagen a ocupar el ancho del recuadro */
      height: 100%;      /* Obliga a la imagen a ocupar el alto del recuadro */
      object-fit: contain; /* Ajusta la imagen de INFO de forma proporcional sin deformarla ni estirarla */
      padding: 0.2em;    /* Un pequeño margen interno para que el logo no toque el borde del cuadro blanco */
    }

    .title {
      font-size: 1.625em;
      font-weight: 700;
    }

    .subtitle {
      font-size: 0.9375em;
      opacity: 0.9;
    }

    .clock {
      text-align: right;
    }

    .clock-time {
      font-size: 2.375em;
      font-weight: 700;
      font-family: monospace;
    }

    .clock-date {
      font-size: 0.9375em;
      opacity: 0.9;
    }

    .status-bar {
      background: white;
      border: 2px solid #e2e8f0;
      border-radius: 0.625em;
      padding: 0.4em 1.5em;
      margin: 0.5em 1.5em;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      box-shadow: 0 1px 0.25em rgba(0, 0, 0, 0.06);
    }

    .status-bar > * {
      margin-right: 1.125em;
    }

    .status-bar > *:last-child {
      margin-right: 0;
    }

    .day-badge {
      background: #608ec9;
      color: white;
      padding: 0.3em 1.25em;
      border-radius: 0.5em;
      font-size: 1.2em;
      font-weight: 700;
      text-transform: uppercase;
    }

    .divider {
      width: 0.125em; 
      height: 2.5em;
      background: #e2e8f0;
    }

    .status-dot {
      width: 0.875em;
      height: 0.875em;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 0.1875em #dcfce7;
    }

    .status-dot.break {
      background: #f59e0b;
      box-shadow: 0 0 0 0.1875em #fef3c7;
    }

    .status-dot.inactive {
      background: #94a3b8;
      box-shadow: none;
    }

    .status-label {
      font-size: 1.25em;
      font-weight: 700;
      font-family: monospace;
    }

    .status-time {
      font-size: 0.875em;
      color: #64748b;
      font-family: monospace;
    }

    .status-info {
      font-size: 1em;
      color: #475569;
    }

    .status-info strong {
      color: #1e293b;
    }

    .filters {
      display: flex;
      margin: 0 1.5em 0.3em;
      align-items: center;
      flex-wrap: wrap;
    }
    .filters > * {
      margin-right: 1em;
    }
    .filters > *:last-child {
      margin-right: 0;
    }

    .filter-group {
      display: flex;
      align-items: center;
    }
    /* Separa la palabra "Día:" o "Vista:" de su respectivo <select> */
    .filter-group .filter-label {
      margin-right: 0.5em;
    }

    .filter-group {
      display: flex;
      align-items: center;
    }

    .filter-label {
      font-size: 0.9375em;
      font-weight: 600;
      color: #475569;
    }

    .filter-select {
      padding: 0.3em 0.875em;
      border: 2px solid #e2e8f0;
      border-radius: 0.5em;
      font-size: 0.9375em;
      font-weight: 600;
      background: #608ec9;
      color: #edf2f8;
      cursor: pointer;
      min-width: 10em;
    }

    .filter-select:focus {
      outline: none;
      border-color: #608ec9;
    }

    .btn-today {
      padding: 0.3em 1.25em;
      background: #1a56db;
      color: white;
      border: none;
      border-radius: 0.5em;
      font-size: 0.9375em;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-today:hover {
      background: #1e40af;
    }

    .btn-today:disabled {
      background: #94a3b8;
      cursor: default;
    }

    .main {
      padding: 0 1.5em 6.25em;
    }

    .weekend-msg {
      text-align: center;
      padding: 3.75em 1.25em;
    }

    .weekend-msg h2 {
      font-size: 1.75em;
      color: #475569;
      margin-bottom: 0.625em;
    }

    .weekend-msg p {
      font-size: 1.125em;
      color: #94a3b8;
    }

    .schedule-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 1.4vh;
      table-layout: fixed;
      background: white;
      border-radius: 0.625em;
      overflow: hidden;
      box-shadow: 0 1px 0.25em rgba(0, 0, 0, 0.06);
      
    }

    .schedule-table th {
      background: #608ec9;
      color: white;
      font-weight: 700;
      padding: 0.75em 0.375em;
      text-align: center;
      border-right: 1px solid rgba(255, 255, 255, 0.15);
      font-size: 0.9375em;
    }

    .schedule-table th:first-child {
      background: #365885;
      min-width: unset;
      width: 4em;
    }

    .schedule-table th.arte {
      background: #7742d4;
    }

    .schedule-table th.labo {
      background: #16a34a;
    }

    .schedule-table td {
      padding: 0.75em 0.5em;
      text-align: center;
      vertical-align: top;
      border: 1px solid #e2e8f0;
      line-height: 1.4;
    }

    .schedule-table td:first-child {
      background: #f1f5f9;
      font-weight: 600;
      text-align: center;
      vertical-align: middle;
      width: 3.5em;
      padding: 0.75em 0.1em; 
    }

    .schedule-table td.arte-col {
      background: #faf5ff;
    }

    .schedule-table td.labo-col {
      background: #f0fdf4;
    }

    .schedule-table tr.current td {
      background: #fefce8;
    }

    .schedule-table tr.current td:first-child {
      background: #fef9c3;
    }

    .schedule-table tr.current td.arte-col {
      background: #fef3c7;
    }

    .schedule-table tr.current td.labo-col {
      background: #fef3c7;
    }

    .materia {
      font-weight: 700;
      font-size: 1.3vh;
      color: #1e293b;
      display: block;
      margin-bottom: 0.25em;
    }

    .materia-info {
      background: #afc7eb;
      color: #365885;
      padding: 0.2em 0.4em;
      border-radius: 20px;
      border: 0px;
      display: block;
      margin-bottom: 0.25em;
    }

    .aula {
      font-family: monospace;
      font-size: 1.2vh;
      background: #dbeafe;
      color: #1a56db;
      padding: 0.1875em 0.375em;
      border-radius: 0.25em;
      display: inline-block;
      margin-top: 0.25em;
    }

    .aula-labo {
      background: #fff;
      color: #9d7cfd;
      border-width: 1px;
      border-style: solid;
      border-color: #9d7cfd;
      font-weight: 700;
      border-radius: 20px;
    }

    .profesor {
      font-size: 1.3vh;
      color: #64748b;
      display: block;
      margin-top: 0.3125em;
    }

    .asistente {
      font-size: 1.1vh;
      background: #dcfce7;
      color: #166534;
      padding: 0.1875em 0.375em;
      border-radius: 0.25em;
      font-weight: 600;
      display: inline-block;
      margin-top: 0.3125em;
    }

    .empty {
      color: #cbd5e1;
    }

    .bloque-num {
      font-size: 1em;
      font-weight: 700;
      color: #afc7eb;
      margin-bottom: 0.125em;
    }

    .bloque-time {
      font-size: 0.7em;
      color: #64748b;
      font-family: monospace;
    }

    .labo-asist {
      background: #dcfce7;
      border: 1px solid #86efac;
      border-radius: 0.375em;
      padding: 0.375em 0.625em;
      font-weight: 700;
      color: #166534;
      font-size: 0.8125em;
      margin: 0.25em 0;
      display: inline-block;
    }

    .labo-asist small {
      font-weight: 400;
      font-size: 0.625em;
      display: block;
      color: #22c55e;
      margin-top: 0.125em;
    }

    .curso-view {
      background: white;
      border-radius: 0.625em;
      padding: 1.25em;
      box-shadow: 0 1px 0.25em rgba(0, 0, 0, 0.06);
    }

    .curso-title {
      font-size: 1.5em;
      font-weight: 700;
      color: #3156a5;
      margin-bottom: 1.125em;
      text-align: center;
    }

    .curso-week-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .curso-week-table th {
      background: #1a56db;
      color: white;
      padding: 0.75em 0.5em;
      text-align: center;
      font-weight: 700;
      font-size: 0.9375em;
      border-right: 1px solid rgba(255, 255, 255, 0.15);
    }

    .curso-week-table th:first-child {
      background: #1e3a8a;
      width: 6.25em;
    }

    .curso-week-table th.today {
      background: #16a34a;
    }

    .curso-week-table td {
      padding: 0.75em 0.5em;
      text-align: center;
      vertical-align: top;
      border: 1px solid #e2e8f0;
      line-height: 1.4;
    }

    .curso-week-table td:first-child {
      background: #f1f5f9;
      font-weight: 600;
      vertical-align: middle;
    }

    .curso-week-table td.today-col {
      background: #f0fdf4;
    }

    .curso-week-table tr.current-row td {
      background: #fefce8;
    }

    .curso-week-table tr.current-row td:first-child {
      background: #fef9c3;
    }

    .curso-week-table tr.current-row td.today-col {
      background: #bbf7d0;
    }

    .curso-table {
      width: 100%;
      border-collapse: collapse;
    }

    .curso-table th {
      background: #1a56db;
      color: white;
      padding: 0.75em 0.875em;
      text-align: left;
      font-weight: 600;
      font-size: 0.9375em;
    }

    .curso-table td {
      padding: 0.75em 0.875em;
      border-bottom: 1px solid #e2e8f0;
      font-size: 0.875em;
    }

    .curso-table tr:nth-child(even) {
      background: #f8fafc;
    }

    .curso-table tr.current-row {
      background: #fef3c7;
    }

    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 2px solid #e2e8f0;
      padding: 0.75em 1.5em;
      display: flex;
      justify-content: center;
    }

    .bottom-bar .block-chip {
      margin-right: 0.625em;
    }

    .bottom-bar .block-chip:last-child {
      margin-right: 0;
    }

    .block-chip {
      padding: 0.625em 1em;
      border-radius: 0.5em;
      font-size: 0.875em;
      font-weight: 600;
      background: #f1f5f9;
      color: #64748b;
    }

    .block-chip.current {
      background: #fef3c7;
      color: #92400e;
      box-shadow: 0 0 0 2px #fbbf24;
    }

    .block-chip span {
      font-family: monospace;
      font-size: 0.6875em;
      display: block;
      color: #94a3b8;
    }

    .block-chip.current span {
      color: #b45309;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .pulse {
      animation: pulse 2s infinite;
    }
  </style>
</head>

<body>
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="logo">
        <img src="infolabo.png" alt="Logo INFO">
      </div>
      <div>
        <div class="title">Panel</div>
        <div class="subtitle">Laboratorio de Informatica</div>
      </div>
    </div>
    <div class="clock">
      <div class="clock-time" id="clock-time">--:--:--</div>
      <div class="clock-date" id="clock-date">--</div>
    </div>
  </div>

  <div class="status-bar">
    <div class="day-badge" id="day-badge">--</div>
    <div class="divider"></div>
    <div class="status-dot" id="status-dot"></div>
    <div>
      <div class="status-label" id="status-label">--</div>
      <div class="status-time" id="status-time"></div>
    </div>
    <div class="divider" id="divider-info"></div>
    <div class="status-info" id="status-info"></div>
    <div class="divider" id="divider-next"></div>
    <div class="status-info" id="status-next"></div>
  </div>

  <div class="filters">
    <div class="filter-group">
      <span class="filter-label">Dia:</span>
      <select class="filter-select" id="day-select" onchange="onDayChange()">
        <option value="auto">Hoy (Auto)</option>
        <option value="1">Lunes</option>
        <option value="2">Martes</option>
        <option value="3">Miercoles</option>
        <option value="4">Jueves</option>
        <option value="5">Viernes</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Vista:</span>
      <select class="filter-select" id="curso-select" onchange="onCursoChange()">
        <option value="all">Todos los cursos</option>
        <option value="3A">3A</option>
        <option value="3B">3B</option>
        <option value="3C">3C</option>
        <option value="3D">3D</option>
        <option value="4A">4A</option>
        <option value="4B">4B</option>
        <option value="4C">4C</option>
        <option value="5A">5A</option>
        <option value="5B">5B</option>
        <option value="5C">5C</option>
        <option value="5D">5D</option>
        <option value="5E">5E</option>
      </select>
    </div>
    <button class="btn-today" id="btn-today" onclick="resetToToday()">Volver a Hoy</button><div id="space-text" class="space-text"></div>
  </div>

  <div class="main">
    <div id="weekend-msg" class="weekend-msg" style="display:none;">
      <h2>Fin de semana</h2>
      <p>No hay clases programadas</p>
    </div>
    <table class="schedule-table" id="schedule-table">
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="curso-view" id="curso-view" style="display:none;">
      <h2 class="curso-title" id="curso-title"></h2>
      <table class="curso-week-table" id="curso-week-table">
        <thead id="curso-week-head"></thead>
        <tbody id="curso-week-body"></tbody>
      </table>
    </div>
  </div>

    function getClase(d, b, c) { for (var i = 0; i < CLASES.length; i++) { var x = CLASES[i]; if (x.dayIdx === d && x.bloque === b && x.curso === c) return x; } return null; }
    function getArteClase(d, b) { return getClase(d, b, 'ARTE'); }
    function getAsistentesEnLabo(d, b) { var r = []; for (var i = 0; i < ASISTENTES.length; i++) { var a = ASISTENTES[i]; if (a.dayIdx === d && a.bloque === b && a.enLabo) r.push(a); } return r; }
    function getAsistenteDeCurso(d, b, c) { for (var i = 0; i < ASISTENTES.length; i++) { var a = ASISTENTES[i]; if (a.dayIdx === d && a.bloque === b && a.curso === c && !a.enLabo) return a; } return null; }
    function esMateriaInfo(materia) {
      var materias = [
        'TI',
        'TEI',
        'PROG',
        'EFSI',
        'EFSI II',
        'IMAGEN',
        'BD',
        'SEMINARIO',
        'HISTORIA',
        'ARTE',
        'PDP',
        'DAI',
        'SSI'
      ];

      return materias.indexOf(materia) !== -1;
    }
    function esAulaInfo(aula) {
      if (!aula) return false;

      var aulas = [
        'CIDI',
        'CIDI IZQ',
        'CIDI DER',
        'HMP',
        'LUM',
        'CEO',
        'AMI',
        '4002'
      ];

      for (var i = 0; i < aulas.length; i++) {
        if (aula.indexOf(aulas[i]) !== -1) {
          return true;
        }
      }

      return false;
    }

    function renderTable(dayIdx, currentSlot) {
      var curBn = currentSlot ? currentSlot.n : null;
      var headHtml = '<tr><th>Bloque</th>';
      for (var c = 0; c < CURSOS.length; c++) headHtml += '<th>' + CURSOS[c] + '</th>';
      headHtml += '<th class="arte">Arte</th><th class="labo">Labo</th></tr>';
      document.getElementById('table-head').innerHTML = headHtml;
      var bodyHtml = '';
      for (var b = 0; b < BLOCK_SLOTS.length; b++) {
        var blq = BLOCK_SLOTS[b];
        var isCur = curBn === blq.n;
        bodyHtml += '<tr' + (isCur ? ' class="current"' : '') + '>';
        bodyHtml += '<td><span class="bloque-num">' + blq.n + '</span><br><span class="bloque-time">' + blq.start + '</span></td>';
        for (var c = 0; c < CURSOS.length; c++) {
          var clase = getClase(dayIdx, blq.n, CURSOS[c]);
          var asist = clase ? getAsistenteDeCurso(dayIdx, blq.n, CURSOS[c]) : null;
          bodyHtml += '<td>';
          if (clase && clase.materia) {
            bodyHtml += '<span class="materia' + (esMateriaInfo(clase.materia) ? ' materia-info' : '') + '">' + clase.materia + '</span>';
            if (clase.aula) bodyHtml += '<span class="aula' + (esAulaInfo(clase.aula) ? ' aula-labo' : '') + '">' + clase.aula + '</span>';
            if (clase.profesor) bodyHtml += '<span class="profesor">' + clase.profesor + '</span>';
            if (asist) bodyHtml += '<span class="asistente">' + asist.nombre + '</span>';
          } else { bodyHtml += '<span class="empty">-</span>'; }
          bodyHtml += '</td>';
        }
        var arte = getArteClase(dayIdx, blq.n);
        bodyHtml += '<td class="arte-col">';
        if (arte && arte.materia) {
          bodyHtml += '<span class="materia' + (esMateriaInfo(arte.materia) ? ' materia-info' : '') + '">' + arte.materia + '</span>';
          if (arte.aula) bodyHtml += '<span class="aula' + (esAulaInfo(arte.aula) ? ' aula-labo' : '') + '">' + arte.aula + '</span>';
          if (arte.profesor) bodyHtml += '<span class="profesor">' + arte.profesor + '</span>';
        } else { bodyHtml += '<span class="empty">-</span>'; }
        bodyHtml += '</td>';
        var enLabo = getAsistentesEnLabo(dayIdx, blq.n);
        bodyHtml += '<td class="labo-col">';
        if (enLabo.length > 0) {
          for (var a = 0; a < enLabo.length; a++) {
            bodyHtml += '<span class="labo-asist">' + enLabo[a].nombre + '<small>' + (enLabo[a].consulta ? 'Consulta' : 'En lab') + '</small></span> ';
          }
        } else { bodyHtml += '<span class="empty">-</span>'; }
        bodyHtml += '</td></tr>';
      }
      document.getElementById('table-body').innerHTML = bodyHtml;
    }

    function renderCursoView(currentSlot, curso) {
      document.getElementById('curso-title').innerHTML = 'Horario Semanal de ' + curso;
      var realDayIdx = getArgentinaDate().getDay();
      var curBn = currentSlot ? currentSlot.n : null;

      // Header with days
      var headHtml = '<tr><th>Bloque</th>';
      for (var d = 1; d <= 5; d++) {
        var isToday = (d === realDayIdx);
        headHtml += '<th' + (isToday ? ' class="today"' : '') + '>' + DIAS_ES[d] + '</th>';
      }
      headHtml += '</tr>';
      document.getElementById('curso-week-head').innerHTML = headHtml;

      // Body with blocks
      var bodyHtml = '';
      for (var b = 0; b < BLOCK_SLOTS.length; b++) {
        var blq = BLOCK_SLOTS[b];
        var isCurRow = (curBn === blq.n);
        bodyHtml += '<tr' + (isCurRow ? ' class="current-row"' : '') + '>';
        bodyHtml += '<td><div class="bloque-num">' + blq.n + '</div><div class="bloque-time">' + blq.start + '</div></td>';

        for (var d = 1; d <= 5; d++) {
          var isToday = (d === realDayIdx);
          var clase = getClase(d, blq.n, curso);
          var asist = clase ? getAsistenteDeCurso(d, blq.n, curso) : null;
          bodyHtml += '<td class="' + (isToday ? 'today-col' : '') + '">';
          if (clase && clase.materia) {
            bodyHtml += '<span class="materia' + (esMateriaInfo(clase.materia) ? ' materia-info' : '') + '">' + clase.materia + '</span>';
            if (clase.aula) bodyHtml += '<span class="aula' + (esAulaInfo(clase.aula) ? ' aula-labo' : '') + '">' + clase.aula + '</span>';
            if (clase.profesor) bodyHtml += '<span class="profesor">' + clase.profesor + '</span>';
            if (asist) bodyHtml += '<span class="asistente">' + asist.nombre + '</span>';
          } else {
            bodyHtml += '<span class="empty">-</span>';
          }
          bodyHtml += '</td>';
        }
        bodyHtml += '</tr>';
      }
      document.getElementById('curso-week-body').innerHTML = bodyHtml;
    }


    function renderBottomBar(currentSlot) {
      var el = document.getElementById('bottom-bar');
      if (!el) return;  // ← si no existe, sale sin error
      var nextSlot = getNextBlock(currentSlot);
      var html = '';
      for (var i = 0; i < BLOCK_SLOTS.length; i++) {
        var b = BLOCK_SLOTS[i];
        var cls = 'block-chip';
        if (currentSlot && b.n === currentSlot.n) cls += ' current';
        html += '<div class="' + cls + '"><strong>' + b.label + '</strong><span>' + b.start + '</span></div>';
      }
      el.innerHTML = html;
    }

    function renderSpace() {
      var el = document.getElementById('space-text');
      if (!el) return;

      setTimeout(function() {
        el.textContent = '';
      }, 500); // visible 0,5 segundos
    }

    function onDayChange() { selectedDay = document.getElementById('day-select').value; updateBtnToday(); update(); }
    function onCursoChange() { selectedCurso = document.getElementById('curso-select').value; update(); }
    function resetToToday() { selectedDay = 'auto'; selectedCurso = 'all'; document.getElementById('day-select').value = 'auto'; document.getElementById('curso-select').value = 'all'; updateBtnToday(); update(); }
    function updateBtnToday() { document.getElementById('btn-today').disabled = (selectedDay === 'auto' && selectedCurso === 'all'); }
    function getDisplayDayIdx() { if (selectedDay === 'auto') return getArgentinaDate().getDay(); return parseInt(selectedDay, 10); }

    function update() {
      var now = getArgentinaDate();
      var realDayIdx = now.getDay();
      var dayIdx = getDisplayDayIdx();
      var currentSlot = (selectedDay === 'auto') ? getCurrentSlot() : null;
      var nextSlot = getNextBlock(currentSlot);
      document.getElementById('clock-time').innerHTML = pad2(now.getHours()) + ':' + pad2(now.getMinutes()) + ':' + pad2(now.getSeconds());
      document.getElementById('clock-date').innerHTML = DIAS_ES[realDayIdx] + ' ' + pad2(now.getDate()) + '/' + pad2(now.getMonth() + 1) + '/' + now.getFullYear();
      document.getElementById('day-badge').innerHTML = DIAS_ES[dayIdx];
      var dot = document.getElementById('status-dot');
      var label = document.getElementById('status-label');
      var time = document.getElementById('status-time');
      if (currentSlot) {
        label.innerHTML = currentSlot.label;
        time.innerHTML = currentSlot.start + ' - ' + currentSlot.end;
        dot.className = currentSlot.type === 'break' ? 'status-dot break pulse' : 'status-dot pulse';
      } else {
        label.innerHTML = selectedDay === 'auto' ? 'Fuera de horario' : 'Viendo ' + DIAS_ES[dayIdx];
        time.innerHTML = '';
        dot.className = 'status-dot inactive';
      }
      var isWeekend = (dayIdx === 0 || dayIdx === 6);
      if (isWeekend) {
        document.getElementById('weekend-msg').style.display = 'block';
        document.getElementById('schedule-table').style.display = 'none';
        document.getElementById('curso-view').style.display = 'none';
        document.getElementById('divider-info').style.display = 'none';
        document.getElementById('status-info').innerHTML = '';
        document.getElementById('divider-next').style.display = 'none';
        document.getElementById('status-next').innerHTML = '';
      } else {
        document.getElementById('weekend-msg').style.display = 'none';
        if (selectedCurso !== 'all') {
          document.getElementById('schedule-table').style.display = 'none';
          document.getElementById('curso-view').style.display = 'block';
          renderCursoView(currentSlot, selectedCurso);
        } else {
          document.getElementById('schedule-table').style.display = 'table';
          document.getElementById('curso-view').style.display = 'none';
          renderTable(dayIdx, currentSlot);
        }
        var clasesHoy = getClasesHoy(dayIdx);
        var curBn = currentSlot ? currentSlot.n : null;
        if (curBn) {
          var pCount = 0;
          for (var i = 0; i < clasesHoy.length; i++) { if (clasesHoy[i].bloque === curBn && clasesHoy[i].curso !== 'ARTE') pCount++; }
          var asistHoy = getAsistentesEnLabo(dayIdx, curBn);
          document.getElementById('divider-info').style.display = 'block';
          document.getElementById('status-info').innerHTML = '<strong>' + pCount + '</strong> clases &middot; <strong>' + asistHoy.length + '</strong> asist. en labo';
        } else {
          document.getElementById('divider-info').style.display = 'none';
          document.getElementById('status-info').innerHTML = '';
        }
        if (nextSlot && currentSlot) {
          document.getElementById('divider-next').style.display = 'block';
          document.getElementById('status-next').innerHTML = 'Proximo: <strong>' + nextSlot.label + '</strong> &middot; ' + nextSlot.start;
        } else {
          document.getElementById('divider-next').style.display = 'none';
          document.getElementById('status-next').innerHTML = '';
        }
      }
      setInterval(function() {
        renderSpace();
      }, 3 * 60 * 1000);

      renderBottomBar(currentSlot);
    }

    updateBtnToday();
    update();
    setInterval(update, 1000);
  </script>
</body>
